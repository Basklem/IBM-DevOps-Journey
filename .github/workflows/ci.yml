name: CI

on:
  push:
    paths:
      - '1-IntroToDevOps/project/**'
  pull_request:
    paths:
      - '1-IntroToDevOps/project/**'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: 1-IntroToDevOps/project/app
        run: pip install -r requirements.txt

      - name: Lint with ruff
        working-directory: 1-IntroToDevOps/project/app
        run: ruff check .

      - name: Run tests
        working-directory: 1-IntroToDevOps/project/app
        run: pytest -v
